name: Billetto Agent

on:
  workflow_dispatch:

  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install playwright

      - run: npx playwright install chromium

      - run: node billetto-agent.js

      - name: Upload debug text
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-text
          path: debug.txt

      - name: Commit status
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add status.json
          git commit -m "Update Billetto status" || echo "No changes"
          git push
